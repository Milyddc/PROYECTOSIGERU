<!DOCTYPE html>

<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Camión | SiGeRU</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>


<header>

    <div class="logo">SiGeRU</div>

    <nav>
        <a href="camiones.html">Volver</a>
    </nav>

</header>

<section class="login-container">

    <div class="login-card">

        <h1>Nuevo Camión</h1>

        <form>

            <div class="input-group">
                <label>Matrícula</label>
                <input type="text">
            </div>

            <div class="input-group">
                <label>Modelo</label>
                <input type="text">
            </div>

            <div class="input-group">
                <label>Estado</label>

                <select>
                    <option>Disponible</option>
                    <option>Mantenimiento</option>
                    <option>Fuera de Servicio</option>
                </select>
            </div>

            <button class="btn-login">
                Guardar Camión
            </button>

        </form>

    </div>

</section>

</body>

</html>
