<!DOCTYPE html>

<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Contenedor | SiGeRU</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>


<header>

    <div class="logo">SiGeRU</div>

    <nav>
        <a href="contenedores.html">Volver</a>
    </nav>

</header>

<section class="login-container">

    <div class="login-card">

        <h1>Nuevo Contenedor</h1>

        <form>

            <div class="input-group">
                <label>Ubicación</label>
                <input type="text">
            </div>

            <div class="input-group">
                <label>Estado</label>

                <select>
                    <option>Disponible</option>
                    <option>Lleno</option>
                    <option>Fuera de Servicio</option>
                </select>
            </div>

            <div class="input-group">
                <label>Tipo de Residuo</label>

                <select>
                    <option>Reciclables</option>
                    <option>Orgánicos</option>
                    <option>Mixtos</option>
                </select>
            </div>

            <button class="btn-login">
                Guardar Contenedor
            </button>

        </form>

    </div>

</section>


</body>

</html>
