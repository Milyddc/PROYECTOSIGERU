<!DOCTYPE html>

<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Usuario | SiGeRU</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>


<header>
    <div class="logo">SiGeRU</div>

    <nav>
        <a href="usuarios.html">Volver</a>
    </nav>
</header>

<section class="login-container">

    <div class="login-card">

        <h1>Nuevo Usuario</h1>

        <form>

            <div class="input-group">
                <label>Nombre</label>
                <input type="text">
            </div>

            <div class="input-group">
                <label>Apellido</label>
                <input type="text">
            </div>

            <div class="input-group">
                <label>Correo</label>
                <input type="email">
            </div>

            <div class="input-group">
                <label>Rol</label>

                <select>
                    <option>Administrador</option>
                    <option>Cuadrilla</option>
                    <option>Operario</option>
                    <option>Vecino</option>
                </select>
            </div>

            <button class="btn-login">
                Guardar Usuario
            </button>

        </form>

    </div>

</section>


</body>

</html>
